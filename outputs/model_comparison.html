
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Сравнение моделей</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 30px;
        }
        table {
            width: auto;
            min-width: 500px;
            border-collapse: collapse;
            font-size: 14px;
            margin: 0 auto;
        }
        th {
            background-color: #2c3e50;
            color: white;
            font-weight: bold;
            text-align: center;
            padding: 10px 8px;
            border: 1px solid #ddd;
        }
        td {
            background-color: white;
            color: black;
            border: 1px solid #ddd;
            padding: 8px;
            vertical-align: middle;
            text-align: center;
        }
        th:first-child {
            width: 40px;
            min-width: 40px;
            max-width: 40px;
        }
        td:first-child {
            width: 40px;
            min-width: 40px;
            max-width: 40px;
        }
        tr:nth-child(even) td {
            background-color: white;
        }
        tr:hover td {
            background-color: #f5f5f5;
        }
        .title {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h2 class="title">Сравнение качества моделей</h2>

<table>
    <thead>
        <tr>
            <th>№</th>
            <th>Модель</th>
            <th>Precision@3</th>
            <th>MRR</th>
            <th>Вопросов</th>
        </tr>
    </thead>
    <tbody>

        <tr>
            <td>1</td>
            <td>MiniLM</td>
            <td>0.8400</td>
            <td>0.5600</td>
            <td>25</td>
        </tr>
    
        <tr>
            <td>2</td>
            <td>mpnet</td>
            <td>0.9200</td>
            <td>0.6333</td>
            <td>25</td>
        </tr>
    
        <tr>
            <td>3</td>
            <td>e5-small</td>
            <td>0.9600</td>
            <td>0.7733</td>
            <td>25</td>
        </tr>
    
    </tbody>
</table>

</body>
</html>
